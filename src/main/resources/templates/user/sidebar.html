<aside th:fragment="sidebar" id="logo-sidebar"
       class="group fixed top-0 left-0 z-40 h-full transition-all duration-300 w-16 hover:w-64   bborder-r border-gray-200 dark:border-gray-600"
       aria-label="Sidebar">
  <div class="h-full px-3 py-4 overflow-y-auto">
    <a href="https://flowbite.com/" class="flex items-center mb-5">
      <img th:src="@{'/images/spherelogo.jpeg'}" class="h-8 rounded-full" alt="Flowbite Logo" />
      <span class="ml-3 text-lg font-semibold whitespace-nowrap text-gray-900dark:text-white hidden group-hover:inline">Welcome</span>
    </a>
    <ul class=" space-y-10 font-medium">
      <li>
        <a th:href="@{'/user/dashboard'}"
           class="flex items-center px-2 py-1.5 rounded-base hover:bg-gray-100 dark:hover:bg-gray-700">
          <svg class="w-6 h-6 transition duration-75 group-hover:text-fg-brand" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6.025A7.5 7.5 0 1 0 17.975 14H10V6.025Z"/><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.5 3c-.169 0-.334.014-.5.025V11h7.975c.011-.166.025-.331.025-.5A7.5 7.5 0 0 0 13.5 3Z"/></svg>

        </a>
      </li>
      <li>
        <a th:href="@{'/user/profile'}"
           class="flex items-center px-2 py-1.5 rounded-base hover:bg-gray-100 dark:hover:bg-gray-700">
          <svg class="w-6 h-6 transition duration-75 group-hover:text-fg-brand" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v14M9 5v14M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Z"/></svg>
          <span class="ml-3 hidden group-hover:inline">Profile</span>
        </a>
      </li>
      <li>
        <a th:href="@{'/user/contacts/add'}"
           class="flex items-center px-2 py-1.5 rounded-base hover:bg-gray-100 dark:hover:bg-gray-700">
          <i class="fa-solid fa-user-plus"></i>
          <span class="ml-3 hidden group-hover:inline">Add Contact</span>
        </a>
      </li>
      <li>
        <a th:href="@{'/user/contacts'}"
           class="flex items-center px-2 py-1.5 rounded-base hover:bg-gray-100 dark:hover:bg-gray-700">
          <i class="fa-solid fa-users-rectangle"></i>
          <span class="ml-3 hidden group-hover:inline">Contacts</span>
        </a>
      </li>
      <li>
        <a href="#"
           class="flex items-center px-2 py-1.5 rounded-base hover:bg-gray-100 dark:hover:bg-gray-700">
          <svg class="w-6 h-6 transition duration-75 group-hover:text-fg-brand" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10V6a3 3 0 0 1 3-3v0a3 3 0 0 1 3 3v4m3-2 .917 11.923A1 1 0 0 1 17.92 21H6.08a1 1 0 0 1-.997-1.077L6 8h12Z"/></svg>
          <span class="ml-3 hidden group-hover:inline">Products</span>
        </a>
      </li>
      <li>
        <a href="#"
           class="flex items-center px-2 py-1.5 rounded-base hover:bg-gray-100 dark:hover:bg-gray-700">
          <svg class="w-6 h-6 transition duration-75 group-hover:text-fg-brand" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12H4m12 0-4 4m4-4-4-4m3-4h2a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3h-2"/></svg>
          <span class="ml-3 hidden group-hover:inline">Sign In</span>
        </a>
      </li>
    </ul>
  </div>
</aside>
