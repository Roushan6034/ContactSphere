<div th:fragment="contact">

  <div id="view-contact-modal" tabindex="-1" aria-hidden="true"
       class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center p-4">

    <!-- Blurred backdrop -->
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>

    <!-- Modal panel -->
    <div class="modal-panel relative w-full max-w-md z-10">
      <div class="relative bg-white dark:bg-gray-900 rounded-3xl shadow-2xl overflow-hidden border border-gray-100 dark:border-gray-700/60">

        <!-- Top gradient band -->
        <div class="h-28 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-400 relative">

          <div class="absolute inset-0 opacity-20"
               style="background-image: radial-gradient(circle, white 1px, transparent 1px);
                      background-size: 24px 24px;"></div>

          <!-- Close button — X svg -->
          <button type="button" onclick="closeContactModal()"
                  class="close-btn absolute top-4 right-4 w-9 h-9 flex items-center justify-center
                         rounded-full bg-white/20 hover:bg-white/35 text-white
                         focus:outline-none transition-colors duration-150">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>

          <!-- Decorative card icon top-left -->
          <div class="absolute top-4 left-4 text-white/20">
            <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24">
              <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm0 2v2h16V6H4zm0 4v8h16v-8H4zm2 2h4v2H6v-2z"/>
            </svg>
          </div>
        </div>

        <!-- Avatar overlapping band -->
        <div class="flex justify-center -mt-12 relative z-10">
          <div class="avatar-ring">
            <div class="bg-white dark:bg-gray-900 rounded-full p-0.5">
              <img id="modal-picture"
                   src=""
                   alt="Contact"
                   onerror="this.src='https://ui-avatars.com/api/?name=Contact&background=6366f1&color=fff&size=96'"
                   class="w-20 h-20 rounded-full object-cover"/>
            </div>
          </div>
        </div>

        <!-- Name, Email, Favourite -->
        <div class="text-center px-6 pt-3 pb-3">
          <h2 id="modal-name"
              class="modal-name text-2xl font-semibold text-gray-800 dark:text-white tracking-tight"></h2>

          <p id="modal-email"
             class="flex items-center justify-center gap-1 text-sm text-indigo-500 dark:text-indigo-400 mt-0.5 font-medium">
            <!-- Envelope SVG -->
            <svg class="w-3.5 h-3.5 opacity-70 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <span id="modal-email-text"></span>
          </p>

          <!-- Favourite badge -->
          <div id="modal-favorite-badge"
               class="hidden mt-2 inline-flex items-center gap-1.5 px-3 py-1
                      bg-amber-50 dark:bg-amber-900/30 text-amber-500
                      rounded-full text-xs font-semibold border border-amber-100 dark:border-amber-800/40">
            <!-- Star SVG -->
            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
            Favourite
          </div>
        </div>

        <!-- Gradient divider -->
        <div class="mx-6 h-px bg-gradient-to-r from-transparent via-gray-200 dark:via-gray-700 to-transparent"></div>

        <!-- Info chips -->
        <div class="px-6 py-4 space-y-2.5">

          <!-- Phone -->
          <div id="modal-phone-row"
               class="info-chip flex items-center gap-3 px-4 py-3 rounded-2xl
                      bg-gray-50 dark:bg-gray-800/60 border border-gray-100 dark:border-gray-700/50">
            <div class="icon-badge w-9 h-9 rounded-xl bg-indigo-100 dark:bg-indigo-900/40
                        flex items-center justify-center shrink-0">
              <svg class="w-4 h-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
              </svg>
            </div>
            <div class="min-w-0">
              <p class="text-[10px] uppercase tracking-widest text-gray-400 dark:text-gray-500 font-semibold">Phone</p>
              <p id="modal-phone" class="text-sm font-medium text-gray-700 dark:text-gray-200 truncate"></p>
            </div>
          </div>

          <!-- Address -->
          <div id="modal-address-row"
               class="info-chip flex items-center gap-3 px-4 py-3 rounded-2xl
                      bg-gray-50 dark:bg-gray-800/60 border border-gray-100 dark:border-gray-700/50">
            <div class="icon-badge w-9 h-9 rounded-xl bg-purple-100 dark:bg-purple-900/40
                        flex items-center justify-center shrink-0">
              <svg class="w-4 h-4 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </div>
            <div class="min-w-0">
              <p class="text-[10px] uppercase tracking-widest text-gray-400 dark:text-gray-500 font-semibold">Address</p>
              <p id="modal-address" class="text-sm font-medium text-gray-700 dark:text-gray-200 truncate"></p>
            </div>
          </div>

          <!-- Website -->
          <div id="modal-website-row"
               class="info-chip flex items-center gap-3 px-4 py-3 rounded-2xl
                      bg-gray-50 dark:bg-gray-800/60 border border-gray-100 dark:border-gray-700/50">
            <div class="icon-badge w-9 h-9 rounded-xl bg-sky-100 dark:bg-sky-900/40
                        flex items-center justify-center shrink-0">
              <svg class="w-4 h-4 text-sky-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
              </svg>
            </div>
            <div class="min-w-0">
              <p class="text-[10px] uppercase tracking-widest text-gray-400 dark:text-gray-500 font-semibold">Website</p>
              <a id="modal-website" href="#" target="_blank"
                 class="text-sm font-medium text-sky-600 dark:text-sky-400 truncate hover:underline block"></a>
            </div>
          </div>

          <!-- About -->
          <div id="modal-desc-row"
               class="info-chip flex items-start gap-3 px-4 py-3 rounded-2xl
                      bg-gray-50 dark:bg-gray-800/60 border border-gray-100 dark:border-gray-700/50">
            <div class="icon-badge w-9 h-9 rounded-xl bg-pink-100 dark:bg-pink-900/40
                        flex items-center justify-center shrink-0 mt-0.5">
              <svg class="w-4 h-4 text-pink-400" fill="currentColor" viewBox="0 0 24 24">
                <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/>
              </svg>
            </div>
            <div class="min-w-0">
              <p class="text-[10px] uppercase tracking-widest text-gray-400 dark:text-gray-500 font-semibold">About</p>
              <p id="modal-description"
                 class="text-sm font-medium text-gray-700 dark:text-gray-200 leading-relaxed line-clamp-3"></p>
            </div>
          </div>

        </div>

        <!-- Social pills -->
        <div id="modal-social-row"
             class="px-6 pb-6 flex items-center justify-center gap-3 flex-wrap">

          <!-- LinkedIn -->
          <a id="modal-linkedin" href="#" target="_blank"
             class="social-pill flex items-center gap-2 px-4 py-2 rounded-xl
                    bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400
                    text-sm font-semibold border border-blue-100 dark:border-blue-800/50">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
            LinkedIn
          </a>

          <!-- Instagram -->
          <a id="modal-instagram" href="#" target="_blank"
             class="social-pill flex items-center gap-2 px-4 py-2 rounded-xl
                    bg-pink-50 dark:bg-pink-900/30 text-pink-500 dark:text-pink-400
                    text-sm font-semibold border border-pink-100 dark:border-pink-800/50">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
            </svg>
            Instagram
          </a>

        </div>

      </div>
    </div>
  </div>

</div>
