<!doctype html>
<html lang="en" th:replace="~{base::parent(~{:: #content5}, ~{::title})}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>View Contacts</title>
</head>
<body>
<div id="content5">
  <div th:if="${loggedInUser}">
    <div th:replace="~{user/sidebar::sidebar}"></div>
  </div>

  <div class="sm:pl-64 min-h-screen">

    <!-- Header -->
    <div class="border-b border-gray-200 dark:border-gray-700 px-3 py-1 text-center">
      <h3 class="text-2xl font-bold text-gray-800 dark:text-white">View Contacts</h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">List of all contacts</p>

    </div>

    <!-- Content -->
    <div class="p-6">
      <div class="border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden shadow-sm">
          <!-- Search -->
        <form th:object="${contactSearchForm}" th:action="@{'/user/contacts/search'}">
        <div class="flex flex-wrap items-center justify-center gap-2 p-4">

          <!-- Filter + Search grouped -->
          <div class="flex items-center rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 shadow-sm overflow-visible">

            <!-- Filter Dropdown -->
            <select  th:field="*{field}" id="filterSelect"
                    class="text-sm font-medium text-gray-600 dark:text-gray-300 bg-transparent px-3 h-10 border-r border-gray-200 dark:border-gray-600 rounded-l-xl focus:outline-none cursor-pointer">
              <option value="Name">Name</option>
              <option value="Email">Email</option>
              <option value="Phone">Phone</option>
              <option value="Address">Address</option>
            </select>

            <!-- Search Input -->
            <input th:field="*{value}" type="text" id="searchInput" placeholder="Search Contacts"
                   class="text-sm bg-transparent border-0 text-gray-800 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 px-3 h-10 w-48 sm:w-64 focus:outline-none">

          </div>

          <!-- Search Button -->
          <button type="submit"
                  class="inline-flex items-center gap-1.5 px-4 h-10 text-sm font-medium text-white bg-blue-500 hover:bg-blue-600 active:scale-95 rounded-xl transition-all duration-150 focus:outline-none shadow-sm whitespace-nowrap">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/>
            </svg>
            Search
          </button>

        </div>
        </form>

        <!-- Table -->
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left" id="contactsTable">
            <thead class="text-xs uppercase bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-600 text-gray-500 dark:text-gray-400">
            <tr>
              <th class="px-6 py-3 font-semibold">Name</th>
              <th class="px-6 py-3 font-semibold hidden sm:table-cell">Phone</th>
              <th class="px-6 py-3 font-semibold hidden md:table-cell">Address</th>
              <th class="px-6 py-3 font-semibold">Links</th>
              <th class="px-6 py-3 font-semibold">Action</th>
            </tr>
            </thead>
            <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-100 dark:divide-gray-700">
            <tr th:each=" c : ${pageContact.getContent()}" th:object="${c}"  class="hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
              <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                  <img class="w-9 h-9 rounded-full object-cover ring-2 ring-gray-100 dark:ring-gray-600" onerror="this.src='https://www.freepik.com/free-vector/young-man-with-glasses-avatar_370751043.htm#fromView=keyword&page=1&position=10&uuid=f71b74fb-bbbb-4f18-aa57-d2f0a02745a3&query=Default+user'" th:src="@{*{picture}}" alt="Neil">
                  <div>
                    <div class="font-semibold text-gray-800 dark:text-white" th:text="*{name}" >Neil Sims</div>
                    <div class="text-xs text-gray-400 dark:text-gray-500" th:text="*{email}"  >neil.sims@email.com</div>
                  </div>
                </div>
              </td>
              <td class="px-6 py-4 hidden sm:table-cell text-gray-600 dark:text-gray-400"  >
                <i class="fa-solid fa-phone"></i>
                <span th:text="*{phoneNumber}"></span>
              </td>
              <td class="px-6 py-4 hidden md:table-cell text-gray-600 dark:text-gray-400" th:text="*{address}" >Mumbai, India</td>
              <td class="px-6 py-4">
                <div class="flex items-center gap-2 text-gray-600 dark:text-gray-400">
                  <i th:if="*{favorite}" class="fa-solid fa-star text-yellow-400 text-base"></i>
                  <i th:unless="*{favorite}" class="fa-regular fa-star text-gray-300 dark:text-gray-600 text-base"></i>
                  <a th:href="*{linkedinLink}" target="_blank" class="text-blue-500 dark:text-blue-400 hover:opacity-80 text-base">
                    <i class="fa-brands fa-linkedin"></i>
                  </a>
                  <a th:href="*{instagramLink}" target="_blank" class="text-pink-500 hover:opacity-80 text-base">
                    <i class="fa-brands fa-square-instagram"></i>
                  </a>
                </div>
              </td>
              <td class="px-6 py-4">
<!--                <a th:href="@{'/user/contacts/delete/'+ *{id}}"><i class="fa-solid fa-trash"></i></a>-->
                <button th:onclick="deleteContact([[${c.id}]])"><i class="fa-solid fa-trash"></i></button>
                <a th:href="@{'/user/contacts/view/'+ *{id}}"><i class="fa-solid fa-pen"></i></a>
                <button th:data-id="${c.id}" th:onclick="loadContactdata(this.getAttribute('data-id'))"><i class="fa-solid fa-eye"></i></button>
              </td>
            </tr>
            </tbody>
          </table>

        <!-- Footer -->
          <div class="pagination_container p-5 flex justify-center">
            <nav aria-label="Page navigation">
              <ul class="flex items-center gap-1 text-sm">

                <li>
                  <a th:href="${pageContact.hasPrevious()} ? @{/user/contacts(page=${pageContact.number - 1}, size=${pageContact.size})} : '#'"
                     th:class="${!pageContact.hasPrevious()}
       ? 'flex items-center gap-1.5 px-4 h-10 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-300 dark:text-gray-600 font-medium cursor-not-allowed'
       : 'flex items-center gap-1.5 px-4 h-10 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 hover:text-gray-700 dark:hover:text-gray-200 font-medium transition-all duration-150'">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Previous
                  </a>
                </li>

                <li th:each="index : ${#numbers.sequence(0, pageContact.totalPages - 1)}">
                  <a th:href="@{/user/contacts(page=${index}, size=${pageContact.size})}"
                     th:text="${index + 1}"
                     th:class="${index == pageContact.number}
                     ? 'flex items-center justify-center w-10 h-10 rounded-xl border border-blue-500 bg-blue-500 text-white font-semibold shadow-sm'
                      : 'flex items-center justify-center w-10 h-10 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 font-medium transition-all duration-150'">
                  </a>
                </li>

                <li>
                  <a th:href="${pageContact.hasNext()} ? @{/user/contacts(page=${pageContact.number + 1}, size=${pageContact.size})} : '#'"
                     th:class="${!pageContact.hasNext()}
       ? 'flex items-center gap-1.5 px-4 h-10 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-300 dark:text-gray-600 font-medium cursor-not-allowed'
       : 'flex items-center gap-1.5 px-4 h-10 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 hover:text-gray-700 dark:hover:text-gray-200 font-medium transition-all duration-150'">
                    Next
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                  </a>
                </li>
              </ul>
            </nav>
          </div>
        </div>


      </div>
    </div>
    <div th:replace="~{user/contact_modals::contact}"></div>
  </div>
  <script th:src="@{'/JS/contacts.js'}"></script>
</div>
</body>
</html>
