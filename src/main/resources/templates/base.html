<!doctype html>
<html  lang="en" th:fragment="parent(content,title)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:replace="${title}">Document</title>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet"/>

    <!-- ✓ No integrity hash — safest way to load FA -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
          crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <link th:href="@{'/CSS/output.css'}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{'/CSS/style.css'}">
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">
<!--common header-->
<div th:if="${loggedInUser}">
    <div th:replace="user/user_navbar::user_navbar"></div>
</div>
<!--<div th:if="${loggedInUser}">-->
<!--    <div th:replace="~{user/sidebar::sidebar}"></div>-->
<!--</div>-->
<div th:unless="${loggedInUser}">
    <div th:replace="navbar::navbar"></div>
</div>

<!--main content-->

<div class="p-4 pt-20 h-screen w-full">
    <section th:replace="${content}"></section>
</div>
<!--footer-->
<footer>

</footer>
 <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{'/JS/script.js'}"></script>
<div th:if="${message}" id="toast-alert"
     th:style="${message.messageType.toString() == 'green'}
               ? 'position:fixed;top:24px;right:24px;z-index:9999;min-width:320px;max-width:400px;display:flex;align-items:flex-start;gap:12px;padding:16px;border-radius:16px;background:linear-gradient(135deg,#dcfce7,#f0fff4);border:1px solid #86efac;color:#166534;box-shadow:0 8px 32px rgba(0,0,0,0.12)'
               : 'position:fixed;top:24px;right:24px;z-index:9999;min-width:320px;max-width:400px;display:flex;align-items:flex-start;gap:12px;padding:16px;border-radius:16px;background:linear-gradient(135deg,#fee2e2,#fff1f1);border:1px solid #fca5a5;color:#991b1b;box-shadow:0 8px 32px rgba(0,0,0,0.12)'">

    <!-- Icon -->
    <div style="width:36px;height:36px;border-radius:10px;background:rgba(0,0,0,0.08);
              display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg th:if="${message.messageType.toString() == 'green'}"
             style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        <svg th:unless="${message.messageType.toString() == 'green'}"
             style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </div>

    <!-- Body -->
    <div style="flex:1;">
        <p style="font-size:11px;font-weight:700;letter-spacing:0.06em;
              text-transform:uppercase;opacity:0.65;margin-bottom:3px;"
           th:text="${message.messageType.toString() == 'green'} ? 'Success' : 'Error'"></p>
        <p style="font-size:14px;font-weight:500;line-height:1.4;"
           th:text="${message.message}"></p>
    </div>

    <!-- Close button -->
    <button onclick="document.getElementById('toast-alert').remove()"
            style="background:none;border:none;cursor:pointer;opacity:0.5;
                 padding:2px;color:inherit;display:flex;align-items:center;">
        <svg style="width:16px;height:16px;" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>

<style>
    @keyframes toastIn {
        from { opacity:0; transform:translateX(60px) scale(0.95); }
        to   { opacity:1; transform:translateX(0) scale(1); }
    }
    #toast-alert { animation: toastIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
</style>

<script>
    const toast = document.getElementById('toast-alert');
    if (toast) {
        setTimeout(() => {
            toast.style.transition = 'opacity 0.3s, transform 0.3s';
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(60px)';
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }
</script>
<!--<script src="https://unpkg.com/@hotwired/turbo@7.3.0/dist/turbo.es2017-esm.js" type="module"></script>-->
</body>

</html>
